name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Paste the YouTube Video URL here'
        required: true
        type: string
      download_type:
        description: 'Choose what to download'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # FIX 1: Install Node.js to provide a JS runtime for yt-dlp signature decryption
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -U yt-dlp

      # FIX 2: Generate the cookies.txt file from the GitHub Secret securely
      - name: Load Cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Create Downloads Folder
        run: mkdir -p downloads

      # Notice the added --cookies parameter in the yt-dlp commands
      - name: Download Video (MP4)
        if: ${{ github.event.inputs.download_type == 'video' }}
        run: |
          cd downloads
          yt-dlp --cookies ../cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 -o "%(title)s.%(ext)s" "${{ github.event.inputs.youtube_url }}"

      - name: Download Audio (MP3)
        if: ${{ github.event.inputs.download_type == 'audio' }}
        run: |
          cd downloads
          yt-dlp --cookies ../cookies.txt --extract-audio --audio-format mp3 --audio-quality 0 -o "%(title)s.%(ext)s" "${{ github.event.inputs.youtube_url }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Download
          path: downloads/*
          retention-days: 1
