name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Paste the YouTube Video URL here'
        required: true
        type: string
      download_type:
        description: 'Choose what to download'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -U git+https://github.com/yt-dlp/yt-dlp.git@master

      # NEW FIX: Install and start Cloudflare WARP to hide the GitHub Datacenter IP
      - name: Setup Cloudflare WARP Proxy
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5 # Give the proxy a few seconds to connect

      - name: Create Downloads Folder
        run: mkdir -p downloads

      # Note the addition of --proxy "socks5://127.0.0.1:40000" to route traffic securely
      - name: Download Video (MP4)
        if: ${{ github.event.inputs.download_type == 'video' }}
        run: |
          cd downloads
          yt-dlp --proxy "socks5://127.0.0.1:40000" \
                 --extractor-args "youtube:player_client=ios,android" \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --merge-output-format mp4 \
                 -o "%(title)s.%(ext)s" "${{ github.event.inputs.youtube_url }}"

      - name: Download Audio (MP3)
        if: ${{ github.event.inputs.download_type == 'audio' }}
        run: |
          cd downloads
          yt-dlp --proxy "socks5://127.0.0.1:40000" \
                 --extractor-args "youtube:player_client=ios,android" \
                 --extract-audio \
                 --audio-format mp3 \
                 --audio-quality 0 \
                 -o "%(title)s.%(ext)s" "${{ github.event.inputs.youtube_url }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Download
          path: downloads/*
          retention-days: 1
